name: intern_management_system
description: "A Flutter-based intern management system with Firebase, Firestore, and role-based access control."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  provider: ^6.1.5+1
  go_router: ^17.2.2
  responsive_framework: ^1.5.1
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  flutter_masked_text2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
        
    
    
                                      